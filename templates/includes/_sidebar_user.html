{% load static %}
{% load admin_tags %}
{% user_sidebar_data as user %}

<aside class="sidebar">
    <button class="sidebar-close-mobile" onclick="closeMobileSidebar()">✕</button>
    <div class="sidebar-logo">
        <img src="{% static 'img/logo.png' %}" alt="Vienne Agencement" class="logo-img">
    </div>
    <nav class="nav-menu">
        <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard_user_page' %}">
                <span class="nav-link-icon">📊</span>
                <span>Dashboard</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link active" href="{% url 'catalogue_page' %}">
                <span class="nav-link-icon">📦</span>
                <span>Catalogue</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{% url 'new_proposition_page' %}">
                <span class="nav-link-icon">✏️</span>
                <span>Nouvelle Proposition</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{% url 'propositions_page' %}">
                <span class="nav-link-icon">📄</span>
                <span>Propositions</span>
            </a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{% url 'change_user_password_page' %}">
                <span class="nav-link-icon">🔒</span>
                <span>Mon mot de passe</span>
            </a>
        </li>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info user-menu-trigger" id="userMenuTrigger" tabindex="0" role="button" aria-haspopup="true"
            aria-expanded="false">
            <div class="user-avatar">{{ user.first_letter }}</div>
            <div class="user-name">{{ user.name }}</div>
        </div>
        <a class="btn-logout" id="sidebarLogoutBtn" href="{% url 'logout_user' %}">Déconnexion</a>
        <div class="logout-menu" id="sidebarLogoutMenu" hidden>
            <a href="{% url 'logout_user' %}">Déconnexion</a>
        </div>
    </div>
</aside>
