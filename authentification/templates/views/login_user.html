{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Vienne Agencement</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages/login.css' %}">
    <link rel="icon" href="{% static 'img/logo_mini.png' %}" sizes="192x192">
</head>
<body>
    <div class="login-screen">
        <div class="login-container">
            <div class="logo">
                <!-- replace text logo with an image file named logo.jpg in the workspace root -->
                <img src="{% static 'img/logo.png' %}" alt="Vienne Agencement" class="logo-img">
            </div>
            <form method="post" action="{% url 'login_user' %}">
                {% csrf_token %}
                <div id="loginMessage" class="form-message" aria-live="polite"></div>
                <div class="form-group">
                    <label for="username">Identifiant</label>
                    <input type="text" id="username"  name="username" value="users1" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password"  name="password" value="0000" required>
                </div>
                <button type="submit" class="btn btn-primary">Connexion</button>
            </form>
            <div style="text-align: center; margin-top: 1rem;">
                <a href="register.html" class="btn btn-secondary" style="width: auto; padding: 0.6rem 1.2rem;">Créer un compte</a>
            </div>
            <div class="login-demo">
                <p>Identifiants de demo :</p>
                <p>users1 / 0000</p>
            </div>
        </div>
    </div>

    <script src="{% static 'js/common.js' %}"></script>
    <script src="{% static 'js/pages/login.js' %}"></script>
</body>
</html>
