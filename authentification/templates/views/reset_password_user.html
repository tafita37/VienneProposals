{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe - Utilisateur</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages/login.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages/password-recovery.css' %}">
    <link rel="icon" href="{% static 'img/logo_mini.png' %}" sizes="192x192">
</head>
<body>
    <div class="login-screen">
        <div class="login-container recovery-container">
            <div class="logo">
                <img src="{% static 'img/logo.png' %}" alt="Vienne Agencement" class="logo-img">
            </div>

            <h2 class="recovery-title">Nouveau mot de passe utilisateur</h2>
            <p class="recovery-subtitle">Compte: <strong>{{ username }}</strong></p>

            {% if messages %}
            <div class="recovery-messages">
                {% for message in messages %}
                <p class="{% if message.tags == 'error' %}message-error{% else %}message-success{% endif %}">{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" action="{% url 'reset_user_password' %}">
                {% csrf_token %}
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group">
                    <label for="new_password">Nouveau mot de passe</label>
                    <input type="password" id="new_password" name="new_password" minlength="8" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirmer le mot de passe</label>
                    <input type="password" id="confirm_password" name="confirm_password" minlength="8" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary">Mettre à jour le mot de passe</button>
            </form>
        </div>
    </div>
</body>
</html>
