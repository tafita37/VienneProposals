{% load static %}

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié - Utilisateur</title>
    <link rel="stylesheet" href="{% static 'css/common.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages/login.css' %}">
    <link rel="stylesheet" href="{% static 'css/pages/password-recovery.css' %}">
    <link rel="icon" href="{% static 'img/logo_mini.png' %}" sizes="192x192">
</head>
<body>
    <div class="login-screen">
        <div class="login-container recovery-container">
            <div class="logo">
                <img src="{% static 'img/logo.png' %}" alt="Vienne Agencement" class="logo-img">
            </div>

            <h2 class="recovery-title">Mot de passe oublié</h2>
            <p class="recovery-subtitle">Saisissez votre email, nous vous enverrons un lien de réinitialisation.</p>

            {% if messages %}
            <div class="recovery-messages">
                {% for message in messages %}
                <p class="{% if message.tags == 'error' %}message-error{% else %}message-success{% endif %}">{{ message }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" action="{% url 'send_user_reset_link' %}">
                {% csrf_token %}
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>

                <button type="submit" class="btn btn-primary">Envoyer le lien</button>
            </form>

            <a class="recovery-back-link" href="{% url 'login_user_page' %}">Retour à la connexion utilisateur</a>
        </div>
    </div>
</body>
</html>
